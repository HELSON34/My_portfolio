<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - PROJET METU DA2I</title>

<style>
/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* BODY */
body{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("ss.jpg") center/cover no-repeat;
min-height:100vh;
color:#000;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(128, 14, 14, 0.8);
position:fixed;
width:100%;
top:0;
color:rgb(235, 222, 222);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00b4d8;
}

nav a{
margin:0 12px;
text-decoration:none;
color:rgb(239, 228, 228);
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:#00b4d8;
}

/* FORMULAIRE */
form{
max-width:450px;
margin:120px auto 40px auto;
background: none;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(227, 222, 222, 0.2);
display:flex;
flex-direction:column;
gap:15px;
}

form h2{
text-align:center;
color:#023e8a;
}

input, textarea{
padding:12px;
border:2px solid #9d1515;
background: none;
border-radius:8px;
font-size:15px;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
padding:12px;
background:none;
color:rgb(228, 225, 234);
border:none;
cursor:pointer;
border-radius:8px;
font-size:16px;
transition:0.3s;
}

button:hover{
background: rgb(111, 111, 209);
transform:scale(1.05);
}

/* CONTACT DIRECT */
.direct{
text-align:center;
margin-top:15px;
}

.direct a{
display:inline-block;
margin:8px;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:rgb(250, 244, 244);
font-weight:bold;
transition:0.3s;
}

.whatsapp{background:#25D366;}
.tel{background:#ff8800;}

.whatsapp:hover{background:#1ebe5d;}
.tel:hover{background:#e67300;}

/* RESPONSIVE */
@media(max-width:600px){
header{
flex-direction:column;
gap:10px;
}
form{
margin-top:150px;
}
}
</style>

</head>
<body>

<header>
<h2 class="logo">PROJET METU DA2I</h2>
<nav>
<a href="index.html">Home</a>
<a href="About.html">About</a>

<a href="Projet.html">Projet</a>
<a href="Contact.html">Contact</a>
</nav>
</header>

<form action="https://formspree.io/f/mvzblope" method="POST">
<h2>Contactez-nous</h2>

<input type="text" name="name" placeholder="Nom" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message" required></textarea>

<button type="submit">Envoyer</button>

<div class="direct">
<h3>Ou contactez-nous directement</h3>

<a class="whatsapp"
href="https://wa.me/26134XXXXXXX" target="_blank">
WhatsApp
</a>

<a class="tel"
href="tel:+26134XXXXXXX">
Téléphone
</a>

</div>

</form>

</body>
</html>
