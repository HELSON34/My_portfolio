/* HEADER */
header{
display:flex;
justify-content: left;
align-items:center;

width:100%;

nav a{

}

.text button{
margin-top:25px;
padding:12px 25px;
background:hsl(342, 100%, 42%);
border:none;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.text button:hover{
background:#0077b6;
transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}
